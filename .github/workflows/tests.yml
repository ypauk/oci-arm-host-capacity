name: Tests

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    name: OCI Capacity Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run OCI Script
        run: |
          echo "Checking if secrets are mapped..."
          [ -z "$OCI_REGION" ] && echo "!!! REGION IS EMPTY !!!" || echo "Region: OK"
          [ -z "$OCI_USER_ID" ] && echo "!!! USER_ID IS EMPTY !!!" || echo "User ID: OK"
          [ -z "$OCI_TENANCY_ID" ] && echo "!!! TENANCY_ID IS EMPTY !!!" || echo "Tenancy ID: OK"
          [ -z "$OCI_KEY_FINGERPRINT" ] && echo "!!! FINGERPRINT IS EMPTY !!!" || echo "Fingerprint: OK"
          
          php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

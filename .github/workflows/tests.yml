name: Tests

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    name: OCI Capacity Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run OCI Script
        run: |
          # 1. Создаем физический файл из секрета
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > private_key.pem
          
          # 2. Даем ему правильные права доступа (безопасность Linux)
          chmod 600 private_key.pem
          
          # 3. Запускаем скрипт
          php index.php
        env:
          # Указываем скрипту ПУТЬ к созданному файлу, а не сам текст
          OCI_PRIVATE_KEY_FILENAME: private_key.pem
          
          # Остальные настройки подтягиваем из секретов
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

          # --- ТУТ ДОДАЄМО TELEGRAM ---
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_BOT_API_KEY: ${{ secrets.TELEGRAM_TOKEN }}  # Одне і те саме значення
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_CHAT_ID }}    # Також дублюємо
